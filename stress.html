    best: { emoji:'🔥', title:'화산 폭발형', sub:'속에 있는 말을 꺼낼 수 있도록 도와줄 에너지 충전소' },
    worst: { emoji:'🧊', title:'냉동 인간형', sub:'둘 다 감정을 숨겨서 서로 힘든 줄 모름' },
  },
};

function GoogleAd({ slot }) {
  const ref = useRef(null);
  useEffect(() => {
    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  }, []);
  return (
    <ins ref={ref} className="adsbygoogle"
      style={{display:'block', width:'100%'}}
      data-ad-client="ca-pub-4166451401478371"
      data-ad-slot={slot}
      data-ad-format="auto"
      data-full-width-responsive="true" />
  );
}

const LOADING_TEXTS = ['스트레스 패턴 분석 중...','감정 해소 방식 매칭 중...','멘탈 유형 계산 중...','결과 생성 중...'];

function ProgressBar({ current, total }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div className="w-full mb-6">
      <div className="flex justify-between text-xs text-gray-400 mb-1.5 font-medium">
        <span>{current} / {total}</span><span>{pct}%</span>
      </div>
      <div className="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500 ease-out"
          style={{width:`${pct}%`, background: ACCENT}} />
      </div>
    </div>
  );
}

function IntroPhase({ onStart }) {
  return (
    <div className="fade-up flex flex-col items-center justify-center min-h-screen px-5 py-12">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-6xl mb-4">🌀</div>
          <div className="inline-block text-xs font-bold px-3 py-1 rounded-full mb-4"
            style={{background: ACCENT_BG, color: ACCENT}}>
            스트레스 유형 테스트
          </div>
          <h1 className="text-2xl font-extrabold text-gray-900 leading-tight mb-3">
            나는 스트레스를<br/>어떻게 다루는 사람?
          </h1>
          <p className="text-sm text-gray-500 leading-relaxed">
            20가지 스트레스 상황으로 알아보는<br/>나의 감정 해소 유형 완전 분석
          </p>
        </div>

        <div className="bg-white rounded-2xl shadow-sm p-5 mb-5">
          <div className="flex items-center gap-3 mb-4">
            <span className="text-2xl">💜</span>
            <div>
              <div className="text-sm font-bold text-gray-900">약 3분 소요</div>
              <div className="text-xs text-gray-400">20문항 · 4가지 스트레스 유형</div>
            </div>
          </div>
          <div className="flex gap-2 flex-wrap">
            {['🔥 화산형','🎪 탈출형','🧊 냉동형','🐌 잠수형'].map(t => (
              <div key={t} className="flex-1 bg-gray-50 rounded-xl py-2 px-1 text-center text-xs text-gray-600 font-medium" style={{minWidth:'70px'}}>{t}</div>
            ))}
          </div>
        </div>

        <button onClick={onStart}
          className="w-full py-4 rounded-2xl text-white font-bold text-lg active:scale-95 transition-transform duration-150"
          style={{background: ACCENT, boxShadow:`0 4px 24px ${ACCENT_GLOW}`}}>
          테스트 시작하기
        </button>
        <p className="text-center text-xs text-gray-400 mt-3">
          현재까지 <span className="font-bold text-gray-600">47,392명</span>이 확인했어요
        </p>
        <div className="text-center mt-4">
          <a href="index.html" className="text-xs text-gray-300 hover:text-gray-400" style={{textDecoration:'none'}}>
            ← 다른 테스트 보러가기
          </a>
        </div>
      </div>
    </div>
  );
}

function BridgePhase({ msg }) {
  return (
    <div className="fixed inset-0 flex items-center justify-center" style={{background: ACCENT, zIndex:50}}>
      <div className="bridge-anim text-center text-white px-8">
        <div className="text-5xl mb-4">{msg.emoji}</div>
        <div className="text-2xl font-extrabold mb-2">{msg.title}</div>
        <div className="text-base opacity-80">{msg.sub}</div>
      </div>
    </div>
  );
}

function QuestionPhase({ question, qIndex, total, onAnswer }) {
  const [selected, setSelected] = useState(null);
  const [key, setKey] = useState(0);
  useEffect(() => { setSelected(null); setKey(k => k+1); }, [qIndex]);
  const handleSelect = (choice) => {
    if (selected !== null) return;
    setSelected(choice);
    setTimeout(() => onAnswer(choice), 220);
  };
  return (
    <div className="min-h-screen flex flex-col px-5 py-8" style={{paddingTop:'env(safe-area-inset-top, 32px)'}}>
      <ProgressBar current={qIndex+1} total={total} />
      <div key={key} className="fade-up flex-1 flex flex-col justify-center">
        <div className="bg-white rounded-2xl shadow-sm p-6 mb-4">
          <div className="text-xs font-bold mb-3 rounded-full inline-block px-3 py-1"
            style={{background: ACCENT_BG, color: ACCENT}}>
            Q{qIndex+1}
          </div>
          <p className="text-lg font-bold text-gray-900 leading-snug">{question.q}</p>
        </div>
        <div className="flex flex-col gap-3">
          {[{choice:'A', label:question.a},{choice:'B', label:question.b}].map(({choice, label}) => (
            <button key={choice} onClick={() => handleSelect(choice)}
              className={`btn-choice w-full text-left p-5 rounded-2xl border-2 font-semibold text-base transition-all duration-200 ${
                selected === choice ? 'selected'
                  : selected !== null ? 'border-gray-100 bg-gray-50 text-gray-300'
                  : 'border-gray-100 bg-white text-gray-800 hover:border-purple-300 hover:bg-purple-50'
              }`}>
              <span className="inline-block w-7 h-7 rounded-full text-center leading-7 text-sm font-bold mr-3"
                style={selected === choice
                  ? {background:'rgba(255,255,255,0.25)', color:'#fff'}
                  : {background:'#F3F4F6', color:'#6B7280'}}>
                {choice}
              </span>
              {label}
            </button>
          ))}
        </div>
      </div>
      <p className="text-center text-xs text-gray-300 mt-6">선택하면 자동으로 다음 질문으로 넘어가요</p>
    </div>
  );
}

function LoadingPhase() {
  const [textIdx, setTextIdx] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setTextIdx(i => (i+1) % LOADING_TEXTS.length), 620);
    return () => clearInterval(iv);
  }, []);
  return (
    <div className="min-h-screen flex flex-col items-center justify-between px-5 py-12">
      <div className="flex-1 flex flex-col items-center justify-center">
        <div className="mb-8">
          <div className="w-16 h-16 rounded-full border-4 spinner"
            style={{borderColor:`${ACCENT_BG} ${ACCENT_BG} ${ACCENT_BG} ${ACCENT}`}} />
        </div>
        <h2 className="text-xl font-extrabold text-gray-900 mb-2 text-center">결과 분석 중</h2>
        <p className="text-sm text-gray-400 fade-in" key={textIdx}>{LOADING_TEXTS[textIdx]}</p>
      </div>
      <div className="w-full max-w-sm">
        <div className="text-xs font-bold text-gray-400 mb-2 text-center">광고</div>
        <GoogleAd slot="3333333333" />
      </div>
    </div>
  );
}

function AdPhase({ onDone }) {
  const [remaining, setRemaining] = useState(30);
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (remaining <= 0) { setDone(true); return; }
    const t = setTimeout(() => setRemaining(r => r-1), 1000);
    return () => clearTimeout(t);
  }, [remaining]);
  return (
    <div className="min-h-screen flex flex-col items-center justify-between px-5 py-10">
      <div className="w-full max-w-sm">
        <p className="text-xs text-gray-400 font-bold mb-2 text-center">광고 시청 후 결과를 확인할 수 있어요</p>
        <div className="relative w-full rounded-2xl overflow-hidden bg-black mb-3" style={{aspectRatio:'16/9'}}>
          <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&rel=0&modestbranding=1"
            allow="autoplay; encrypted-media" allowFullScreen
            style={{width:'100%',height:'100%',border:'none',position:'absolute',inset:0}} />
          <div className="absolute top-3 right-3 bg-black bg-opacity-70 text-white text-xs font-bold px-2.5 py-1 rounded-full">
            {done ? '✅ 광고 완료' : `${remaining}초 후 건너뛰기`}
          </div>
        </div>
        <div className="flex items-center justify-between mb-6">
          <span className="text-xs text-gray-400">스폰서 광고</span>
          <div className="flex-1 mx-3 bg-gray-200 rounded-full h-1 overflow-hidden">
            <div className="h-full rounded-full transition-all duration-1000 ease-linear"
              style={{width:`${((30-remaining)/30)*100}%`, background: ACCENT}} />
          </div>
          <span className="text-xs font-bold" style={{color: done ? '#10B981' : ACCENT}}>
            {done ? '완료' : `${remaining}s`}
          </span>
        </div>
        <button onClick={done ? onDone : undefined} disabled={!done}
          className="w-full py-4 rounded-2xl font-bold text-base transition-all duration-300"
          style={{
            background: done ? ACCENT : '#E5E7EB',
            color: done ? '#fff' : '#9CA3AF',
            boxShadow: done ? `0 4px 24px ${ACCENT_GLOW}` : 'none',
            cursor: done ? 'pointer' : 'not-allowed',
          }}>
          {done ? '🎉 결과 보러가기 →' : `⏳ ${remaining}초 후 결과 확인 가능`}
        </button>
        {!done && <p className="text-center text-xs text-gray-400 mt-3">광고를 시청해주셔서 감사해요 🙏</p>}
      </div>
    </div>
  );
}

function BarStat({ label, value, color }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs font-semibold text-gray-600 mb-1.5">
        <span>{label}</span><span style={{color}}>{value}%</span>
      </div>
      <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
        <div className="bar-fill h-full rounded-full"
          style={{'--target-width':`${value}%`, width:`${value}%`, background:color}} />
      </div>
    </div>
  );
}

function ResultPhase({ result, onRestart }) {
  const handleShare = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사되었어요! 친구에게 공유해보세요 🌀'));
    } else {
      alert('링크를 복사해서 친구에게 공유해보세요!\n' + window.location.href);
    }
  };
  return (
    <div className="min-h-screen px-5 py-10 pb-20">
      <div className="max-w-sm mx-auto">

        <div className="fade-up bg-white rounded-2xl shadow-sm p-6 mb-4 text-center">
          <div className="text-5xl mb-3">{result.emoji}</div>
          <div className="inline-block text-xs font-bold px-3 py-1 rounded-full mb-2"
            style={{background: ACCENT_BG, color: ACCENT}}>
            나의 스트레스 유형
          </div>
          <h2 className="text-2xl font-extrabold text-gray-900 mb-1">{result.title}</h2>
          <p className="text-sm font-semibold mb-4" style={{color: ACCENT}}>{result.subtitle}</p>
          <p className="text-sm text-gray-600 leading-relaxed">{result.desc}</p>
        </div>

        <div className="fade-up bg-white rounded-2xl shadow-sm p-6 mb-4" style={{animationDelay:'0.08s'}}>
          <h3 className="text-sm font-extrabold text-gray-900 mb-4">📊 나의 스트레스 지수</h3>
          <BarStat label="💬 감정 표현력" value={result.eScore} color="#8B5CF6" />
          <BarStat label="🔇 감정 억제력" value={100 - result.eScore} color="#6B7280" />
          <BarStat label="⚡ 문제 직면력" value={result.cScore} color="#EF4444" />
          <BarStat label="🏃 회피 성향" value={100 - result.cScore} color="#10B981" />
        </div>

        <div className="fade-up bg-white rounded-2xl shadow-sm p-6 mb-4" style={{animationDelay:'0.14s'}}>
          <h3 className="text-sm font-extrabold text-gray-900 mb-4">✨ 나의 핵심 특징 3가지</h3>
          {result.traits.map((t, i) => (
            <div key={i} className="flex gap-3 mb-3 last:mb-0">
              <div className="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold"
                style={{background: ACCENT}}>
                {i+1}
              </div>
              <p className="text-sm text-gray-700 leading-relaxed">{t}</p>
            </div>
          ))}
        </div>

        <div className="fade-up bg-white rounded-2xl shadow-sm p-5 mb-4" style={{animationDelay:'0.18s'}}>
          <h3 className="text-sm font-extrabold text-gray-900 mb-2">💡 스트레스 관리 팁</h3>
          <p className="text-sm text-gray-600 leading-relaxed">{result.tip}</p>
        </div>

        <div className="fade-up grid grid-cols-2 gap-3 mb-4" style={{animationDelay:'0.22s'}}>
          <div className="bg-white rounded-2xl shadow-sm p-4">
            <div className="text-xs font-bold text-green-500 mb-2">💚 찰떡 조합</div>
            <div className="text-2xl mb-1">{result.best.emoji}</div>
            <div className="text-sm font-bold text-gray-900 mb-1">{result.best.title}</div>
            <div className="text-xs text-gray-400 leading-tight">{result.best.sub}</div>
          </div>
          <div className="bg-white rounded-2xl shadow-sm p-4">
            <div className="text-xs font-bold text-red-400 mb-2">🌶️ 충돌 주의</div>
            <div className="text-2xl mb-1">{result.worst.emoji}</div>
            <div className="text-sm font-bold text-gray-900 mb-1">{result.worst.title}</div>
            <div className="text-xs text-gray-400 leading-tight">{result.worst.sub}</div>
          </div>
        </div>

        <div className="fade-up mb-4" style={{animationDelay:'0.24s'}}>
          <div className="text-xs font-bold text-gray-400 mb-2 text-center">광고</div>
          <GoogleAd slot="4444444444" />
        </div>

        <div className="fade-up flex flex-col gap-3" style={{animationDelay:'0.28s'}}>
          <button onClick={handleShare}
            className="w-full py-4 rounded-2xl font-bold text-base border-2 border-gray-200 bg-white text-gray-800 active:scale-95 transition-transform duration-150">
            🔗 결과 공유하기
          </button>
          <button onClick={onRestart}
            className="w-full py-3 rounded-2xl text-sm text-gray-400 font-medium active:scale-95 transition-transform duration-150">
            🔄 다시 테스트하기
          </button>
          <a href="index.html"
            className="block w-full py-3 rounded-2xl text-sm text-gray-400 font-medium text-center active:scale-95 transition-transform duration-150"
            style={{textDecoration:'none'}}>
            🏠 다른 테스트 보러가기
          </a>
        </div>

      </div>
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState('INTRO');
  const [qIndex, setQIndex] = useState(0);
  const [scores, setScores] = useState({ E:0, S:0, C:0, V:0 });
  const [result, setResult] = useState(null);
  const [showBridge, setShowBridge] = useState(false);
  const [bridgeMsg, setBridgeMsg] = useState(null);

  const handleStart = () => { setPhase('QUESTION'); setQIndex(0); setScores({E:0,S:0,C:0,V:0}); };

  const handleAnswer = (choice) => {
    const q = QUESTIONS[qIndex];
    const type = choice === 'A' ? q.typeA : q.typeB;
    const newScores = { ...scores, [type]: scores[type]+1 };
    setScores(newScores);
    const nextIdx = qIndex+1;
    if (nextIdx >= QUESTIONS.length) {
      const es = newScores.E >= newScores.S ? 'E' : 'S';
      const cv = newScores.C >= newScores.V ? 'C' : 'V';
      setResult(RESULTS[es+cv] || RESULTS['EC']);
      setPhase('LOADING');
      setTimeout(() => setPhase('AD'), 2500);
      return;
    }
    if (BRIDGE_MESSAGES[nextIdx]) {
      setBridgeMsg(BRIDGE_MESSAGES[nextIdx]);
      setShowBridge(true);
      setTimeout(() => { setShowBridge(false); setQIndex(nextIdx); }, 850);
    } else {
      setQIndex(nextIdx);
    }
  };

  const handleRestart = () => { setPhase('INTRO'); setQIndex(0); setScores({E:0,S:0,C:0,V:0}); setResult(null); };

  return (
    <div style={{background:'#F3F4F6', minHeight:'100vh'}}>
      <div className="max-w-sm mx-auto" style={{minHeight:'100vh', background:'#F3F4F6'}}>
        {showBridge && bridgeMsg && <BridgePhase msg={bridgeMsg} />}
        {phase === 'INTRO' && <IntroPhase onStart={handleStart} />}
        {phase === 'QUESTION' && !showBridge && (
          <QuestionPhase question={QUESTIONS[qIndex]} qIndex={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer} />
        )}
        {phase === 'LOADING' && <LoadingPhase />}
        {phase === 'AD' && <AdPhase onDone={() => setPhase('RESULT')} />}
        {phase === 'RESULT' && result && <ResultPhase result={result} onRestart={handleRestart} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
